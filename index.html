<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>ESP32 Dashboard</title>
<style>
    /* --- АНИМАЦИИ И БАЗОВЫЕ НАСТРОЙКИ --- */
    @keyframes scan { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    * { box-sizing: border-box; }
    
    body { 
        margin: 0; 
        height: 100vh; 
        background-color: #000; 
        color: cyan; 
        font-family: 'Segoe UI', 'Arial', sans-serif; 
        font-weight: 300; /* Более тонкий */
        overflow-x: hidden; 
        background-image: 
            linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px), 
            linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px); 
        background-size: 30px 30px; 
    }

    /* --- ВЕРХНЯЯ ПАНЕЛЬ (ЧАСЫ) --- */
    .topBar { 
        width: 320px; 
        height: 55px; 
        margin: 20px auto; 
        background: rgba(26, 26, 26, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: 15px; 
        color: #0ff; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        font-size: 36px; /* Крупнее */
        font-family: 'Segoe UI', 'Arial', sans-serif; 
        font-weight: 300; /* Тонкий */
        letter-spacing: 4px; 
        text-shadow: 0 0 10px #0ff; 
        border: 1px solid rgba(0, 255, 255, 0.1);
    }

    /* --- ГЛАВНЫЕ ПАНЕЛИ --- */
    .mainBar, .setupBar { 
        width: 320px; 
        height: 35px; 
        background: #1a1a1a; 
        border-radius: 20px; 
        box-shadow: 0 0 10px rgba(64, 224, 208, 0.2); 
        color: cyan; 
        text-align: center; 
        position: relative; 
        overflow: hidden; 
        transition: all 0.5s ease; 
        cursor: pointer; 
        margin: 20px auto;
        transform: scale(1);
        border: 1px solid rgba(0, 255, 255, 0.1);
        font-family: 'Segoe UI', 'Arial', sans-serif; 
        font-weight: 300;
    }

    /* РАЗДЕЛЬНАЯ ВЫСОТА */
    .mainBar.expanded { 
        height: 325px; /* Для System table */
    }
    #bar.expanded { 
        height: 305px; /* Для Control Panel */
    }
    /* stringBar (Data desk) высоту НЕ ставим, ее ставит JS через style.height */

    .mainBar.expanded, .setupBar.expanded { 
        cursor: default; 
        box-shadow: 0 0 15px 3px rgba(64, 224, 208, 0.8); 
        transform: scale(1.02); 
    }

    .mainLabel, .setupLabel { 
        line-height: 35px; 
        font-size: 18px; /* Крупнее */
        font-family: 'Segoe UI', 'Arial', sans-serif; 
        font-weight: 300;
    }
    .expanded .mainLabel, .expanded .setupLabel { display: none; }

    /* --- КОНТЕНТ ВНУТРИ --- */
    .syncContent, .setupContent { 
        opacity: 0; 
        pointer-events: none; 
        transition: opacity 0.4s ease; 
        display: flex; 
        flex-direction: column; 
        align-items: stretch;
        padding: 15px 10px;
    }

    .expanded .syncContent, .expanded .setupContent { opacity: 1; pointer-events: auto; }


    .syncRow, .setupRow { 
        display: flex; 
        align-items: center; 
        margin: 8px 0; /* Чуть больше отступ */
        justify-content: space-between;
    }

    .setupText { 
        width: 75px; /* Чуть шире */
        color: cyan; 
        font-size: 15px; /* Крупнее */
        text-align: left; 
        flex-shrink: 0;
        font-family: 'Segoe UI', 'Arial', sans-serif; 
        font-weight: 300;
    }

    /* --- ПРОГРЕСС-БАРЫ --- */
    .progressBar { 
        flex-grow: 1; 
        height: 26px; /* Выше */
        background-color: #2c2c2c; 
        border-radius: 13px; 
        box-shadow: 0 0 4px 1px rgba(64, 224, 208, 0.2); 
        position: relative; 
        overflow: hidden; 
        margin-left: 10px; 
        transition: box-shadow 0.3s ease;
    }

    .progressBar.highlight { 
        box-shadow: 0 0 6px 2px rgba(64, 224, 208, 0.6), 0 0 12px 4px rgba(64, 224, 208, 1); 
    }

.progressFill { 
    position: absolute; 
    height: 100%; 
    background: linear-gradient(90deg, #00ffff, #00bfff); 
    width: 0%; 
    border-radius: 12px;
    transition: width 0.5s ease, box-shadow 0.3s ease, filter 0.3s ease;
    opacity: 1; 
}

.progressFill.glow {
    box-shadow: 0 0 20px rgba(0, 255, 255, 0.8);
    filter: brightness(1.5);
}

    .progressText { 
        position: absolute; 
        left: 12px; 
        top: 50%;
        transform: translateY(-50%); 
        color: #000000 !important; /* ЧЕРНЫЙ текст */
        font-size: 14px; /* Крупнее */
        font-weight: 500; /* Полужирный для контраста */
        white-space: nowrap; 
        z-index: 2; 
        text-shadow: 0 0 2px rgba(255,255,255,0.5);
        font-family: 'Segoe UI', 'Arial', sans-serif; 
    }

    /* --- КНОПКИ И ВВОД --- */
    .setupButton { 
        width: 100px; 
        height: 30px; /* Чуть выше */
        background: rgba(0,0,0,0.3); 
        border-radius: 15px; 
        cursor: pointer; 
        border: 1px solid orange; 
        color: orange; 
        font-weight: 400; 
        display: flex; 
        align-items: center; 
        justify-content: center;
        font-size: 14px; /* Крупнее */
        transition: all 0.4s ease; 
        overflow: hidden;
        font-family: 'Segoe UI', 'Arial', sans-serif; 
        letter-spacing: 0.5px;
    }

    .slideText { 
        display: inline-block; 
        transition: transform 0.2s ease, opacity 0.2s ease; 
        font-weight: 300;
    }

    .upload-active { 
        background: linear-gradient(90deg, rgba(0,255,255,0), rgba(0,255,255,0.3), rgba(0,255,255,0)) !important; 
        background-size: 200% 100% !important; 
        animation: scan 1.2s infinite linear; 
        border-color: cyan !important; 
    }

    .upload-success { 
        border-color: #00ff00 !important; 
        color: #00ff00 !important; 
        box-shadow: 0 0 15px rgba(0, 255, 0, 0.4) !important; 
        text-shadow: 0 0 5px #00ff00; 
    }

    .closeBtn, .closeBtnSetup { 
        text-align: center; 
        font-size: 14px; /* Крупнее */
        margin-top: 20px; 
        padding: 8px 0; 
        cursor: pointer; 
        color: cyan; 
        text-transform: uppercase; 
        border-top: 1px solid rgba(0, 255, 255, 0.1);
        font-family: 'Segoe UI', 'Arial', sans-serif; 
        font-weight: 300;
        letter-spacing: 1px;
    }

    input.textInput { 
        flex: 1; 
        border-radius: 8px; 
        padding: 6px 10px; /* Больше padding */
        background: #000; 
        color: cyan; 
        border: 1px solid #004444; 
        margin-left: 10px; 
        outline: none;
        font-family: 'Segoe UI', 'Arial', sans-serif; 
        font-weight: 300;
        font-size: 14px;
    }

    /* --- КРАСИВЫЙ СПИСОК ФАЙЛОВ --- */
    #stringBar .fileList { 
        margin: 8px 0 12px 0;
        padding: 0;
        max-height: 160px; 
        overflow-y: auto;
        width: 100%;
        border: 1px solid rgba(0, 255, 255, 0.2);
        border-radius: 8px;
        background: rgba(0, 20, 20, 0.3);
    }

    #stringBar .fileItem { 
        display: flex; 
        justify-content: space-between; 
        align-items: center;
        font-size: 14px; /* Крупнее */
        height: 34px; /* Выше */
        padding: 0 12px;
        border-bottom: 1px solid rgba(0, 255, 255, 0.1); 
        color: cyan;
    }

    #stringBar .fileItem:last-child {
        border-bottom: none;
    }

    #stringBar .fName { 
        color: cyan; 
        overflow: hidden; 
        text-overflow: ellipsis; 
        white-space: nowrap; 
        flex: 1;
        font-size: 14px;
        text-align: left;
        font-family: 'Segoe UI', 'Arial', sans-serif; 
        font-weight: 300;
    }

    #stringBar .fActions {
        display: flex;
        gap: 12px;
        margin-left: 10px;
    }

    #stringBar .fAct { 
        cursor: pointer; 
        color: cyan; 
        font-weight: 400; 
        text-decoration: none; 
        font-size: 12px; /* Крупнее */
        padding: 3px 10px;
        transition: all 0.3s ease;
        border: 1px solid rgba(0, 255, 255, 0.3);
        border-radius: 4px;
        font-family: 'Segoe UI', 'Arial', sans-serif; 
    }

    #stringBar .fAct:hover {
        background: rgba(0, 255, 255, 0.1);
        box-shadow: 0 0 8px cyan;
        border-color: cyan;
    }

    #stringBar .fDel { 
        color: #ff6b6b;
        border-color: rgba(255, 107, 107, 0.3);
    }

    #stringBar .fDel:hover {
        background: rgba(255, 68, 68, 0.1);
        color: #ff4444;
        box-shadow: 0 0 8px #ff4444;
        border-color: #ff4444;
    }
</style>
</head>
<body>

<div class="topBar" id="topBar">--:--:--</div>

<div id="infoPanel" style="text-align:center; color:rgba(0,255,255,0.7); font-size:12px; margin-top:-10px; letter-spacing:1px; height:15px;">
    STATUS: <span id="infoStatus">CONNECTING...</span>
</div>
<div class="mainBar" id="systemBar">
  <div class="mainLabel">System table</div>
  <div class="syncContent">
    <div class="syncRow"><div class="setupText">Heap</div><div class="progressBar"><div id="freeHeapFill" class="progressFill"></div><div id="freeHeapText" class="progressText">0%</div></div></div>
    <div class="syncRow"><div class="setupText">RSSI</div><div class="progressBar"><div id="rssiFill" class="progressFill"></div><div id="rssiText" class="progressText">0%</div></div></div>
    <div class="syncRow"><div class="setupText">CPU°C</div><div class="progressBar"><div id="tempFill" class="progressFill"></div><div id="tempText" class="progressText">0°C</div></div></div>
    <div class="syncRow"><div class="setupText">HUB°C</div><div class="progressBar"><div id="hubFill" class="progressFill"></div><div id="hubText" class="progressText">0°C</div></div></div>
    <div class="syncRow"><div class="setupText">Device</div><button class="setupButton" id="rebootBtn" style="border-color:orange;color:orange;"><span class="slideText">REBOOT</span></button></div>
<div class="syncRow">
  <div class="setupText">Recovery</div>
  <button class="setupButton" id="recoveryBtn" style="border-color:orange;color:orange;">
    <span class="slideText">START</span>
  </button>
</div>
    <div class="closeBtn" id="closeBtn">CLOSE</div>
  </div>
</div>

<div id="controlBar">
  <div class="setupBar" id="bar">
    <div class="setupLabel">Control Panel</div>
    <div class="setupContent">
      <div class="setupRow"><div class="setupText">BTN 1</div><button class="setupButton" id="btn1"><span class="slideText">OFF</span></button></div>
      <div class="setupRow"><div class="setupText">Auto Update</div><button class="setupButton" id="btn2"><span class="slideText">OFF</span></button></div>
      <div class="setupRow"><div class="setupText">BTN 3</div><button class="setupButton" id="btn3"><span class="slideText">OFF</span></button></div>
      <div class="setupRow"><div class="setupText">BTN 4</div><button class="setupButton" id="btn4"><span class="slideText">OFF</span></button></div>
      <div class="setupRow"><div class="setupText">BTN 5</div><button class="setupButton" id="btn5"><span class="slideText">OFF</span></button></div>
      <div class="closeBtnSetup" id="closeBtnSetup">CLOSE</div>
    </div>
  </div>
</div>

<div class="setupBar" id="stringBar">
  <div class="setupLabel">Data desk</div>
  <div class="setupContent" id="stringContent">
    <div class="setupRow"><div class="setupText">Status:</div><div id="str1Val" class="slideText">---</div></div>
    <div class="setupRow"><div class="setupText">Mode:</div><div id="str2Val" class="slideText">---</div></div>
    <div class="setupRow"><div class="setupText">Software:</div><div id="str3Val" class="slideText">---</div></div>
    <div class="setupRow"><div class="setupText">Token:</div><input id="input1" type="text" class="textInput" onchange="setInput(1,this.value)"></div>
    <div class="setupRow"><div class="setupText">API:</div><input id="input2" type="text" class="textInput" onchange="setInput(2,this.value)"></div>
    <div class="setupRow">
      <div class="setupText">Config:</div>
      <button class="setupButton" id="upBtn" style="border-color:cyan;color:cyan;" onclick="event.stopPropagation(); document.getElementById('fUp').click()"><span class="slideText">UPLOAD</span></button>
      <input type="file" id="fUp" style="display:none" onchange="uploadFile(this)">
    </div>
    <div class="fileList" id="fileList"></div>
    <div class="closeBtnSetup" id="closeStringBtn">CLOSE</div>
  </div>
</div>

<script>
/* TIME & SLIDE */
function updateTime(){ document.getElementById('topBar').textContent = new Date().toTimeString().split(' ')[0]; }
setInterval(updateTime, 1000); updateTime();

function slideText(el, txt) {
  if (!el || el.textContent === txt) return;
  el.style.transform = 'translateY(15px)'; el.style.opacity = '0';
  setTimeout(() => {
    el.textContent = txt; el.style.transform = 'translateY(-15px)';
    setTimeout(() => { el.style.transform = 'translateY(0)'; el.style.opacity = '1'; }, 30);
  }, 200);
}

/* ФУНКЦИЯ ОЖИДАНИЯ ПЕРЕЗАГРУЗКИ ESP */
function checkServerResurrection(callback) {
    let attempts = 0;
    const checkStatus = setInterval(() => {
        attempts++;
        fetch('/metrics')
            .then(r => {
                if (r.ok) { 
                    clearInterval(checkStatus);
                    if (callback) callback();
                }
            })
            .catch(() => {
                if (attempts > 30) { // 30 секунд таймаут
                    clearInterval(checkStatus);
                    document.getElementById('infoStatus').textContent = "OFFLINE";
                    document.getElementById('infoStatus').style.color = "red";
                }
            });
    }, 1000);
}

/* METRICS */
const systemBar = document.getElementById('systemBar');
let mData = { hV:0, hT:327680, rV:0, tV:0, hbV:0 };
let mDisp = { hD:0, rD:0, tD:0, hbD:0 };

function fetchMetrics(){
  fetch('/metrics').then(r=>r.json()).then(d=>{ 
    mData = { hV:d.usedHeap, hT:d.totalHeap, rV:d.rssi, tV:d.cpuTemp, hbV:d.temp_hub }; 
  });
}

function animateBars(){
  mDisp.hD += (mData.hV - mDisp.hD) * 0.1;
  mDisp.rD += (mData.rV - mDisp.rD) * 0.1;
  mDisp.tD += (mData.tV - mDisp.tD) * 0.1;
  mDisp.hbD += (mData.hbV - mDisp.hbD) * 0.1;
  
  // Функция обновления бара с динамическим свечением
  function updateBar(fillId, textId, value, max, unit) {
    const percent = Math.min(100, Math.max(0, value/max*100));
    const fill = document.getElementById(fillId);
    const text = document.getElementById(textId);
    
    fill.style.width = percent + '%';
    
    // Чем ближе к 100%, тем слабее свечение
    // От 1.5 яркости при 0% до 0.7 при 100%
    const brightness = 1.5 - (percent / 100) * 0.8;
    // Размер свечения от 25px до 8px
    const glowSize = 25 - (percent / 100) * 17;
    // Прозрачность свечения от 0.9 до 0.3
    const glowAlpha = 0.9 - (percent / 100) * 0.6;
    
    fill.style.boxShadow = `0 0 ${glowSize}px rgba(0, 255, 255, ${glowAlpha})`;
    fill.style.filter = `brightness(${brightness})`;
    
    // Текст
    if (unit === '%') text.textContent = Math.round(percent) + '%';
    else if (unit === 'dBm') text.textContent = Math.round(value) + 'dBm';
    else text.textContent = Math.round(value) + '°C';
  }
  
  // Обновляем все бары
  updateBar('freeHeapFill', 'freeHeapText', mDisp.hD, mData.hT, '%');
  
  // Для RSSI другая формула
  const rssiPercent = Math.min(100, Math.max(0, (mDisp.rD + 100) / 70 * 100));
  updateBar('rssiFill', 'rssiText', mDisp.rD + 100, 70, 'dBm');
  
  updateBar('tempFill', 'tempText', mDisp.tD, 100, '°C');
  updateBar('hubFill', 'hubText', mDisp.hbD, 100, '°C');
  
  if(systemBar.classList.contains('expanded')) requestAnimationFrame(animateBars);
}

systemBar.onclick = () => {
  if(!systemBar.classList.contains('expanded')){
    systemBar.classList.add('expanded'); fetchMetrics(); animateBars();
    window.mT = setInterval(fetchMetrics, 5000);
  }
};
document.getElementById('closeBtn').onclick = e => { e.stopPropagation(); systemBar.classList.remove('expanded'); clearInterval(window.mT); };

/* RECOVERY MODE TRIGGER */
document.getElementById('recoveryBtn').onclick = (e) => {
  e.stopPropagation();
  if (!confirm("ВКЛЮЧИТЬ АВАРИЙНЫЙ РЕЖИМ?\n(Страница будет перезагружена)")) return;
  
  const btn = e.currentTarget, span = btn.querySelector('.slideText');
  btn.classList.add('upload-active');
  slideText(span, "WAIT...");

  fetch('/startRecovery').then(r => {
    if(r.ok) {
      setTimeout(() => { 
        location.href = '/'; 
      }, 1000);
    }
  }).catch(() => {
    slideText(span, "ERROR");
    btn.classList.remove('upload-active');
  });
};

/* REBOOT - ИСПРАВЛЕННЫЙ ПОД ESP (GET запрос) */
document.getElementById('rebootBtn').onclick = (e) => {
    e.stopPropagation();
    if (!confirm("REBOOT DEVICE?")) return;
    
    const btn = e.currentTarget, span = btn.querySelector('.slideText');
    const oldText = span.textContent;
    
    btn.classList.add('upload-active');
    slideText(span, "REBOOT...");
    
    // Отключаем все интервалы
    clearInterval(window.mT);
    clearInterval(window.bT);
    clearInterval(window.sT);
    
    document.getElementById('infoStatus').textContent = "REBOOTING...";
    document.getElementById('infoStatus').style.color = "orange";
    
    // ИСПРАВЛЕНИЕ: используем GET запрос как на ESP
    fetch('/reboot')  // Убрали { method: 'POST' }
        .then(() => {
            slideText(span, "BOOT...");
            
            // Ждем перезагрузку
            checkServerResurrection(() => {
                // ESP ожила
                document.getElementById('infoStatus').style.color = "cyan";
                slideText(span, "REBOOT");
                btn.classList.remove('upload-active');
                
                // Восстанавливаем интервалы если панели открыты
                if (systemBar.classList.contains('expanded')) {
                    fetchMetrics();
                    window.mT = setInterval(fetchMetrics, 2000);
                }
                if (document.getElementById('bar').classList.contains('expanded')) {
                    fetchBtns();
                    window.bT = setInterval(fetchBtns, 2000);
                }
                if (stringBar.classList.contains('expanded') && isAdmin) {
                    fetchStrings();
                    refreshFiles();
                    window.sT = setInterval(() => { 
                        fetchStrings(); 
                        refreshFiles(); 
                    }, 4000);
                }
                
                updateStatus();
            });
        })
        .catch((err) => {
            console.log("Reboot error:", err);
            slideText(span, "ERROR");
            setTimeout(() => {
                slideText(span, oldText);
                btn.classList.remove('upload-active');
            }, 2000);
        });
};

/* BUTTONS CONTROL */
const btns = ['btn1','btn2','btn3','btn4','btn5'];
let blinkState = false;

function updateBtn(id, act){
  const b = document.getElementById(id), s = b.querySelector('.slideText');
  slideText(s, act?'ON':'OFF');
  b.classList.toggle('active', act);
  if(!act) { b.style.borderColor = 'red'; b.style.color = 'red'; b.style.boxShadow = 'none'; }
}

function fetchBtns(){
  fetch('/getButtons').then(r=>r.json()).then(d=>{ btns.forEach(id => updateBtn(id, Boolean(d[id]))); });
}

document.getElementById('bar').onclick = (e) => {
  if(!e.currentTarget.classList.contains('expanded') && !e.target.closest('button')){
    e.currentTarget.classList.add('expanded'); fetchBtns();
    window.bT = setInterval(fetchBtns, 2000);
  }
};
document.getElementById('closeBtnSetup').onclick = e => { e.stopPropagation(); document.getElementById('bar').classList.remove('expanded'); clearInterval(window.bT); };

btns.forEach((id, i)=>{
  document.getElementById(id).onclick = (e) => {
    e.stopPropagation();
    const val = document.getElementById(id).classList.contains('active') ? 0 : 1;
    fetch(`/setButton?btn=${i+1}&val=${val}`).then(fetchBtns);
  }
});

setInterval(()=> {
  blinkState = !blinkState;
  btns.forEach(id => {
    const b = document.getElementById(id);
    if(b && b.classList.contains('active')) {
      b.style.color = 'cyan';
      b.style.borderColor = blinkState ? 'cyan' : '#004444';
      b.style.boxShadow = blinkState ? '0 0 10px cyan' : 'none';
    }
  });
}, 800);

/* DATA DESK (STRINGS & FILES) С ЗАЩИТОЙ */
const stringBar = document.getElementById('stringBar');
let isAdmin = false; // Флаг, что пароль введен верно

function adjustStringHeight() {
  if(stringBar.classList.contains('expanded')) {
    const content = document.getElementById('stringContent');
    stringBar.style.height = (content.offsetHeight + 15) + "px";
  }
}

// Функция открытия админки
function openAdminPanel() {
  stringBar.classList.add('expanded');
  fetchStrings(); 
  refreshFiles();
  window.sT = setInterval(() => { fetchStrings(); refreshFiles(); }, 4000);
}

stringBar.onclick = (e) => {
  // Игнорируем клики по кнопкам и полям внутри
  if(e.target.closest('input') || e.target.closest('button') || e.target.closest('.fAct')) return;

  if(!stringBar.classList.contains('expanded')){
    if(!isAdmin) {
      const pass = prompt("Введите пароль администратора:");
      if(!pass) return;

      // Проверяем пароль на сервере
      fetch(`/login?pass=${encodeURIComponent(pass)}`).then(r => {
        if(r.ok) {
          isAdmin = true;
          openAdminPanel();
        } else {
          alert("НЕВЕРНЫЙ ПАРОЛЬ!");
        }
      });
    } else {
      openAdminPanel();
    }
  }
};

document.getElementById('closeStringBtn').onclick = e => { 
  e.stopPropagation(); 
  stringBar.classList.remove('expanded'); 
  stringBar.style.height = "35px"; 
  clearInterval(window.sT);
  // isAdmin = false; // Раскомментируй, если хочешь вводить пароль при каждом открытии
};

function updateStatus() {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 3000);

    fetch('/status', { signal: controller.signal })
        .then(r => {
            if (!r.ok) throw new Error(); 
            return r.json();
        })
        .then(d => {
            const el = document.getElementById('infoStatus');
            el.textContent = d.info;
            el.style.color = "cyan";
            clearTimeout(timeoutId);
        })
        .catch(() => {
            const el = document.getElementById('infoStatus');
            el.textContent = "OFFLINE";
            el.style.color = "red";
        });
}

setInterval(updateStatus, 3000);
updateStatus();

function fetchStrings() {
  fetch('/getStrings').then(r => r.json()).then(d => {
    slideText(document.getElementById('str1Val'), d.str1);
    slideText(document.getElementById('str2Val'), d.str2);
    slideText(document.getElementById('str3Val'), d.str3);
    
    const inp1 = document.getElementById('input1');
    const inp2 = document.getElementById('input2');
    if (document.activeElement !== inp1) inp1.value = d.input1 || "";
    if (document.activeElement !== inp2) inp2.value = d.input2 || "";

    adjustStringHeight();
    
    const isAutoUpdate = document.getElementById('btn2').classList.contains('active');
    if (d.str3 === "Updating" && isAutoUpdate) {
        document.body.style.pointerEvents = "none";
        document.body.style.filter = "blur(4px) grayscale(0.7)";
        setTimeout(() => checkServerResurrection(() => {
            document.body.style.pointerEvents = "auto";
            document.body.style.filter = "none";
        }), 15000);
    }
  });
}

/* ФАЙЛЫ - ОБНОВЛЕННАЯ ФУНКЦИЯ */
function refreshFiles(){
    fetch('/list').then(r => r.json()).then(d => {
        const l = document.getElementById('fileList');
        if (d.length === 0) {
            l.innerHTML = '<div class="fileItem"><span class="fName" style="color: #666;">EMPTY STORAGE</span></div>';
        } else {
            l.innerHTML = d.map(f => 
                `<div class="fileItem">
                    <span class="fName">${f.name}</span>
                    <div class="fActions">
                        <a class="fAct" href="/${f.name}" download onclick="event.stopPropagation()">GET</a>
                        <span class="fAct fDel" onclick="deleteFile('${f.name}')">DEL</span>
                    </div>
                </div>`
            ).join('');
        }
        adjustStringHeight();
    });
}

function uploadFile(i) {
  if (!i.files[0]) return;
  const f = new FormData(); f.append("file", i.files[0], i.files[0].name);
  const btn = document.getElementById('upBtn'), textSpan = btn.querySelector('.slideText');
  btn.classList.add('upload-active'); slideText(textSpan, 'SENDING...');
  fetch('/uploadConfig', { method: 'POST', body: f }).then(r => {
      btn.classList.remove('upload-active');
      if (r.ok) { btn.classList.add('upload-success'); slideText(textSpan, 'OK'); refreshFiles(); }
      setTimeout(() => { btn.classList.remove('upload-success'); slideText(textSpan, 'UPLOAD'); }, 1500);
  }).finally(() => { i.value = ''; });
}

function deleteFile(n) {
  event.stopPropagation();
  // Спрашиваем пароль еще раз для подтверждения серьезного действия
  const pass = prompt("Введите пароль администратора для удаления " + n + ":");
  if (!pass) return;

  if (confirm('Вы уверены, что хотите удалить ' + n + '?')) {
    fetch(`/delete?file=${n}&pass=${encodeURIComponent(pass)}`)
      .then(r => {
        if (r.ok) {
          refreshFiles();
        } else if (r.status === 401) {
          alert("ОШИБКА: Неверный пароль!");
        } else {
          alert("Ошибка при удалении файла.");
        }
      });
  }
}
function setInput(n, v){ fetch(`/setInput?num=${n}&val=${encodeURIComponent(v)}`); }
</script>
